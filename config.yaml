# GAI MCP 默认配置

# AI 模型配置
ai:
  # 可选: claude, openai, local
  provider: claude
  # Claude 配置
  claude:
    model: claude-sonnet-4-20250514
    max_tokens: 1024
    # 自定义 API 地址 (留空使用官方地址)
    # base_url: https://api.anthropic.com
  # OpenAI 配置
  openai:
    model: gpt-4o
    max_tokens: 1024
    # 自定义 API 地址 (留空使用官方地址，可填第三方中转地址)
    # base_url: https://api.openai.com/v1
  # 本地模型配置 (Ollama)
  local:
    base_url: http://localhost:11434
    model: llava

# 游戏循环配置
game_loop:
  # 截图间隔 (秒)
  capture_interval: 2.0
  # 操作间延迟 (秒)
  action_delay: 0.5
  # 画面变化阈值 (0-1, 越小越敏感)
  change_threshold: 0.02
  # 截图质量 (JPEG 1-100)
  screenshot_quality: 75
  # 截图最大宽度 (像素, 用于压缩)
  screenshot_max_width: 1280

# 虚拟桌面
virtual_desktop:
  enabled: true
  # 是否在会话结束后自动清理虚拟桌面
  auto_cleanup: true

# ============================================================
# 高级功能配置 (借鉴 Cradle 架构)
# 所有功能默认关闭，按需开启
# ============================================================
advanced:
  # --- Feature 1: 任务推断 ---
  # AI 维护 "当前在做什么" 的状态，而非每帧独立决策
  task_inference_enabled: true

  # --- Feature 2: 自我反思 ---
  # 操作后对比前后截图，验证操作是否成功
  reflection_enabled: true
  # 像素差异低于此值视为操作可能失败 (0-1)
  reflection_diff_threshold: 0.005
  # 操作失败后最大重试次数
  reflection_max_retries: 2

  # --- Feature 3: 记忆系统 ---
  # 短期记忆: 最近 N 帧的上下文滑动窗口
  memory_enabled: true
  short_term_capacity: 10
  # 长期记忆: 跨会话持久化经验库 (~/.gai_mcp/experiences/)
  long_term_enabled: true

  # --- Feature 4: 动态技能生成 ---
  # AI 在游玩中自动生成可复用技能 (~/.gai_mcp/dynamic_skills/)
  dynamic_skills_enabled: true
  max_dynamic_skills: 50

  # --- Feature 5: 分层决策 ---
  # 用本地 CV 处理简单帧，只在需要时调用 LLM，降低 API 成本
  layered_decision_enabled: true
  # 画面变化低于此值走本地决策
  local_cv_change_threshold: 0.01
  # 连续静态帧数超过此值才调 LLM 检查是否卡住
  static_frame_patience: 3
